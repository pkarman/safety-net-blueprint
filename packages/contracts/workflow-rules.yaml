$schema: ./schemas/rules-schema.yaml
version: "1.0"
domain: workflow
resource: workflow/tasks
ruleSets:
  - id: workflow-assignment
    ruleType: assignment
    evaluation: first-match-wins
    context:
      - as: application
        entity: intake/applications
        from: subjectId
    rules:
      - id: snap-to-snap-queue
        order: 1
        condition:
          in:
            - snap
            - var: application.programs
        action:
          assignToQueue: snap-intake
        fallbackAction:
          assignToQueue: general-intake
        description: Route tasks linked to a SNAP application to the SNAP intake queue.
      - id: default-to-general-queue
        order: 2
        condition: true
        action:
          assignToQueue: general-intake
        description: Route all other tasks to the general intake queue.
  - id: workflow-priority
    ruleType: priority
    evaluation: first-match-wins
    rules:
      - id: expedited-flag
        order: 1
        condition:
          "==":
            - var: this.isExpedited
            - true
        action:
          setPriority: expedited
        description: Set expedited priority when the task is flagged as expedited.
      - id: default-priority
        order: 2
        condition: true
        action:
          setPriority: normal
        description: Set normal priority for all other tasks.
