# JSON Schema for Metrics YAML
# Validates structural correctness. Cross-artifact references
# (e.g., action values in filters matching state machine transition IDs)
# are validated by the validation script.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: Metrics
description: Schema for behavioral contract metrics YAML files.
type: object
required:
  - version
  - domain
  - metrics
additionalProperties: false

properties:
  version:
    type: string
    description: Schema version for change tracking.

  domain:
    type: string
    description: Domain namespace (e.g., workflow).

  metrics:
    type: array
    description: Metric definitions.
    items:
      $ref: "#/$defs/Metric"
    minItems: 1

$defs:
  Metric:
    type: object
    description: A single metric definition with source, aggregate, and optional targets.
    required:
      - id
      - name
      - description
      - aggregate
    properties:
      id:
        type: string
        description: Unique identifier for overlay targeting (e.g., task_time_to_claim).
      name:
        type: string
        description: Human-readable metric name.
      description:
        type: string
        description: What this metric measures.
      aggregate:
        type: string
        enum:
          - count
          - ratio
          - duration
        description: >
          Aggregation function: count (total matching records), ratio (count / total),
          duration (median seconds between paired from/to events).
      source:
        $ref: "#/$defs/MetricSource"
        description: >
          Data source for count and ratio metrics. Required when aggregate is
          count or ratio.
      total:
        $ref: "#/$defs/MetricSource"
        description: >
          Denominator source for ratio metrics. When absent, defaults to all records
          in the same collection as source. Explicit total allows cross-collection
          ratios (e.g., release events / total tasks created).
      from:
        $ref: "#/$defs/MetricSource"
        description: >
          Start event source for duration metrics. Required when aggregate is duration.
      to:
        $ref: "#/$defs/MetricSource"
        description: >
          End event source for duration metrics. Required when aggregate is duration.
      pairBy:
        type: string
        description: >
          Field to correlate from/to events for duration metrics (e.g., objectId).
          Distinct from the groupBy query parameter, which controls result breakdown.
      targets:
        type: array
        items:
          $ref: "#/$defs/MetricTarget"
        minItems: 1
    additionalProperties: false

  MetricSource:
    type: object
    description: A filtered collection query.
    required:
      - collection
    properties:
      collection:
        type: string
        enum:
          - tasks    # task records — queries current state (status, slaInfo, etc.)
          - events   # audit log — queries transition history (action, timestamp, etc.)
        description: Which collection to query.
      filter:
        description: >
          Optional JSON Logic condition. When provided, only records where the
          condition evaluates to true are included.
    additionalProperties: false

  MetricTarget:
    type: object
    description: A threshold or goal for the metric.
    required:
      - stat
    properties:
      stat:
        type: string
        description: >
          Statistic type: p50, p95, p99, avg, max, trend, ratio, count.
      operator:
        type: string
        enum:
          - "<"
          - "<="
          - ">"
          - ">="
          - "=="
        description: Comparison operator for evaluating the target.
      amount:
        type: number
        description: Machine-readable threshold value. Used by the engine to evaluate pass/fail.
      unit:
        type: string
        enum:
          - hours
          - minutes
          - days
          - percent
          - count
        description: Unit for the amount field.
      label:
        type: string
        description: Human-readable target label (e.g., "4h", "10%", "trend down").
      direction:
        type: string
        enum:
          - up
          - down
        description: Desired trend direction (for trend-type targets).
    additionalProperties: false
