openapi: 3.1.0
info:
  title: Workflow Service API
  version: 0.1.0
  x-domain: workflow
  x-status: alpha
  x-visibility: internal
  description: |
    REST API for managing workflow entities such as tasks and queues.

    This service provides task lifecycle management for safety net benefits programs.
    Tasks represent units of work assigned to caseworkers, supervisors, or automated
    processes. Queues organize tasks by team, program, or skill for routing.

    > **Status: Alpha** — Breaking changes expected.

  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com
    description: Production server
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Tasks
    description: Manage workflow tasks.
  - name: Events
    description: Read-only domain event log for task lifecycle transitions.
  - name: Queues
    description: Manage task routing queues.

paths:
  "/queues":
    get:
      summary: List queues
      description: Retrieve a paginated list of queues.
      operationId: listQueues
      tags:
        - Queues
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
      responses:
        "200":
          description: A paginated collection of queues.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create a queue
      description: Create a new routing queue.
      operationId: createQueue
      tags:
        - Queues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueCreate"
      responses:
        "201":
          description: Queue created successfully.
          headers:
            Location:
              description: URL of the newly created queue resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Queue"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/queues/{queueId}":
    parameters:
      - $ref: "#/components/parameters/QueueIdParam"

    get:
      summary: Get a queue
      description: Retrieve a single queue by identifier.
      operationId: getQueue
      tags:
        - Queues
      responses:
        "200":
          description: Queue retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Queue"
              examples:
                QueueExample1:
                  $ref: "./workflow-openapi-examples.yaml#/QueueExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a queue
      description: Apply partial updates to an existing queue.
      operationId: updateQueue
      tags:
        - Queues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueUpdate"
      responses:
        "200":
          description: Queue updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Queue"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete a queue
      description: Permanently remove a queue record.
      operationId: deleteQueue
      tags:
        - Queues
      responses:
        "204":
          description: Queue deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/tasks":
    get:
      summary: List tasks
      description: Retrieve a paginated list of tasks.
      operationId: listTasks
      tags:
        - Tasks
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
      responses:
        "200":
          description: A paginated collection of tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create a task
      description: Create a new workflow task.
      operationId: createTask
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created successfully.
          headers:
            Location:
              description: URL of the newly created task resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/tasks/{taskId}":
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"

    get:
      summary: Get a task
      description: Retrieve a single task by identifier.
      operationId: getTask
      tags:
        - Tasks
      responses:
        "200":
          description: Task retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
              examples:
                TaskExample1:
                  $ref: "./workflow-openapi-examples.yaml#/TaskExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a task
      description: Apply partial updates to an existing task.
      operationId: updateTask
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete a task
      description: Permanently remove a task record.
      operationId: deleteTask
      tags:
        - Tasks
      responses:
        "204":
          description: Task deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/events":
    get:
      summary: List domain events
      description: Retrieve a paginated list of domain events across all resources.
      operationId: listEvents
      tags:
        - Events
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
      responses:
        "200":
          description: A paginated collection of domain events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainEventList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/events/stream":
    get:
      summary: Stream domain events (SSE)
      description: |
        Real-time stream of domain events delivered as Server-Sent Events (SSE).

        Connect with `Accept: text/event-stream`. Each event is delivered as a
        `data:` line containing a JSON-encoded `DomainEvent` object.

        The stream stays open until the client disconnects. A `: heartbeat` comment
        is sent every 30 seconds to prevent proxy timeouts.
      operationId: streamEvents
      tags:
        - Events
      responses:
        "200":
          description: SSE stream of domain events.
          content:
            text/event-stream:
              schema:
                type: string
                description: Newline-delimited SSE frames, each containing a JSON DomainEvent.

  "/events/{eventId}":
    parameters:
      - $ref: "#/components/parameters/EventIdParam"

    get:
      summary: Get a domain event
      description: Retrieve a single domain event by identifier.
      operationId: getEvent
      tags:
        - Events
      responses:
        "200":
          description: Domain event retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainEvent"
              examples:
                DomainEventExample1:
                  $ref: "./workflow-openapi-examples.yaml#/DomainEventExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

components:
  parameters:
    QueueIdParam:
      name: queueId
      in: path
      required: true
      description: Unique identifier of the queue.
      schema:
        type: string
        format: uuid
      example: c1d2e3f4-a5b6-7890-cdef-1234567890ab

    TaskIdParam:
      name: taskId
      in: path
      required: true
      description: Unique identifier of the task.
      schema:
        type: string
        format: uuid
      example: d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f90

    EventIdParam:
      name: eventId
      in: path
      required: true
      description: Unique identifier of the domain event.
      schema:
        type: string
        format: uuid
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

  schemas:
    Queue:
      type: object
      description: A routing queue that organizes tasks by team, program, or skill.
      additionalProperties: false
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the queue.
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Machine-readable name for the queue (e.g., snap-intake).
        description:
          type: string
          maxLength: 2000
          description: Human-readable description of the queue's purpose.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the queue was created.
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the queue was last updated.
          readOnly: true

    QueueCreate:
      allOf:
        - $ref: "#/components/schemas/Queue"
        - type: object
          description: |
            Payload to create a new queue. Name is required.

            Note: id, createdAt, and updatedAt are server-generated (readOnly) and will be returned in the response.
          required:
            - name

    QueueList:
      type: object
      description: Paginated list of queues.
      additionalProperties: false
      required:
        - items
        - total
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Queue"
        total:
          type: integer
          minimum: 0
          description: Total number of queues available.
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Maximum number of queues requested.
        offset:
          type: integer
          minimum: 0
          description: Number of items skipped before the current page.
        hasNext:
          type: boolean
          description: Indicates whether more queues are available beyond the current page.

    QueueUpdate:
      allOf:
        - $ref: "#/components/schemas/Queue"
        - type: object
          description: |
            Payload to update one or more fields of an existing queue. Partial updates are supported.

            Note: id, createdAt, and updatedAt are server-generated (readOnly) and cannot be updated.
          minProperties: 1

    Task:
      type: object
      description: A workflow task representing a unit of work in a safety net benefits program.
      additionalProperties: false
      required:
        - id
        - name
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the task.
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable label for the task.
        description:
          type: string
          maxLength: 2000
          description: Detailed information about the task.
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
          description: Current lifecycle state.
        programType:
          $ref: "./components/common.yaml#/Program"
          description: The benefits program this task is associated with.
        isExpedited:
          type: boolean
          description: Whether this task requires expedited processing.
        queueId:
          type: string
          format: uuid
          description: Reference to the Queue this task is routed to.
          x-relationship:
            resource: Queue
        priority:
          type: string
          enum:
            - expedited
            - high
            - normal
            - low
          description: Task processing priority.
        startedAt:
          type: string
          format: date-time
          description: When work began (status transitioned to in_progress).
        completedAt:
          type: string
          format: date-time
          description: When work finished.
        assignedToId:
          type: string
          format: uuid
          description: Reference to the User assigned to this task.
          x-relationship:
            resource: User
        caseId:
          type: string
          format: uuid
          description: Reference to the Case this task belongs to.
          x-relationship:
            resource: Case
        outcome:
          type: string
          description: Completion outcome recorded when the task was completed (e.g., approved, denied).
        completionNotes:
          type: string
          description: Optional notes recorded when the task was completed.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the task was created.
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the task was last updated.
          readOnly: true

    DomainEvent:
      $ref: "./components/events.yaml#/DomainEvent"

    DomainEventList:
      description: Paginated list of domain events.
      unevaluatedProperties: false
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/DomainEvent"

    TaskCreate:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          description: |
            Payload to create a new task. At minimum, name and status are required.

            Note: id, createdAt, and updatedAt are server-generated (readOnly) and will be returned in the response.
          required:
            - name
            - status

    TaskList:
      description: Paginated list of tasks.
      unevaluatedProperties: false
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Task"

    TaskUpdate:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          description: |
            Payload to update one or more fields of an existing task. Partial updates are supported.

            Note: id, createdAt, and updatedAt are server-generated (readOnly) and cannot be updated.
          minProperties: 1
