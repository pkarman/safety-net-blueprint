openapi: 3.1.0
info:
  title: Workflow Service API
  version: 0.1.0
  x-domain: workflow
  x-status: alpha
  x-visibility: internal
  description: |
    REST API for managing workflow entities such as tasks and queues.

    This service provides task lifecycle management for safety net benefits programs.
    Tasks represent units of work assigned to caseworkers, supervisors, or automated
    processes. Queues organize tasks by team, program, or skill for routing.

    > **Status: Alpha** — Breaking changes expected.

  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com
    description: Production server
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Tasks
    description: Manage workflow tasks.
  - name: Events
    description: Read-only domain event log for task lifecycle transitions.
  - name: Queues
    description: Manage task routing queues.
  - name: Metrics
    description: Computed operational metrics derived from task and event data.

paths:
  "/queues":
    get:
      summary: List queues
      description: Retrieve a paginated list of queues.
      operationId: listQueues
      tags:
        - Queues
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
      responses:
        "200":
          description: A paginated collection of queues.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create a queue
      description: Create a new routing queue.
      operationId: createQueue
      tags:
        - Queues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueCreate"
      responses:
        "201":
          description: Queue created successfully.
          headers:
            Location:
              description: URL of the newly created queue resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Queue"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/queues/{queueId}":
    parameters:
      - $ref: "#/components/parameters/QueueIdParam"

    get:
      summary: Get a queue
      description: Retrieve a single queue by identifier.
      operationId: getQueue
      tags:
        - Queues
      responses:
        "200":
          description: Queue retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Queue"
              examples:
                QueueExample1:
                  $ref: "#/components/examples/QueueExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a queue
      description: Apply partial updates to an existing queue.
      operationId: updateQueue
      tags:
        - Queues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueUpdate"
      responses:
        "200":
          description: Queue updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Queue"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete a queue
      description: Permanently remove a queue record.
      operationId: deleteQueue
      tags:
        - Queues
      responses:
        "204":
          description: Queue deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/tasks":
    get:
      summary: List tasks
      description: Retrieve a paginated list of tasks.
      operationId: listTasks
      tags:
        - Tasks
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
      responses:
        "200":
          description: A paginated collection of tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    post:
      summary: Create a task
      description: Create a new workflow task.
      operationId: createTask
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
            examples:
              TaskCreateExample1:
                $ref: "#/components/examples/TaskCreateExample1"
      responses:
        "201":
          description: Task created successfully.
          headers:
            Location:
              description: URL of the newly created task resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/tasks/{taskId}":
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"

    get:
      summary: Get a task
      description: Retrieve a single task by identifier.
      operationId: getTask
      tags:
        - Tasks
      responses:
        "200":
          description: Task retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
              examples:
                TaskExample1:
                  $ref: "#/components/examples/TaskExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    patch:
      summary: Update a task
      description: Apply partial updates to an existing task.
      operationId: updateTask
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "422":
          $ref: "./components/responses.yaml#/UnprocessableEntity"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

    delete:
      summary: Delete a task
      description: Permanently remove a task record.
      operationId: deleteTask
      tags:
        - Tasks
      responses:
        "204":
          description: Task deleted successfully.
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/events":
    get:
      summary: List domain events
      description: Retrieve a paginated list of domain events across all resources.
      operationId: listEvents
      tags:
        - Events
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
      responses:
        "200":
          description: A paginated collection of domain events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainEventList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/events/stream":
    get:
      summary: Stream domain events (SSE)
      description: |
        Real-time stream of domain events delivered as Server-Sent Events (SSE).

        Connect with `Accept: text/event-stream`. Each event is delivered as a
        `data:` line containing a JSON-encoded `DomainEvent` object.

        The stream stays open until the client disconnects. A `: heartbeat` comment
        is sent every 30 seconds to prevent proxy timeouts.
      operationId: streamEvents
      tags:
        - Events
      responses:
        "200":
          description: SSE stream of domain events.
          content:
            text/event-stream:
              schema:
                type: string
                description: Newline-delimited SSE frames, each containing a JSON DomainEvent.

  "/events/{eventId}":
    parameters:
      - $ref: "#/components/parameters/EventIdParam"

    get:
      summary: Get a domain event
      description: Retrieve a single domain event by identifier.
      operationId: getEvent
      tags:
        - Events
      responses:
        "200":
          description: Domain event retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainEvent"
              examples:
                DomainEventExample1:
                  $ref: "#/components/examples/DomainEventExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/workflow/metrics":
    get:
      summary: List metrics
      description: Retrieve computed values for all workflow metrics.
      operationId: listMetrics
      tags:
        - Metrics
      parameters:
        - $ref: "./components/parameters.yaml#/SearchQueryParam"
        - $ref: "./components/parameters.yaml#/LimitParam"
        - $ref: "./components/parameters.yaml#/OffsetParam"
        - name: groupBy
          in: query
          required: false
          description: >
            Field to group results by (e.g., `queueId`, `programType`). When specified,
            `value` in each metric is null and `breakdown` contains a map of group value
            to computed metric value.
          schema:
            type: string
          example: queueId
        - name: from
          in: query
          required: false
          description: Start of time window for filtering events and tasks by timestamp.
          schema:
            type: string
            format: date-time
          example: "2024-09-01T00:00:00Z"
        - name: to
          in: query
          required: false
          description: End of time window for filtering events and tasks by timestamp.
          schema:
            type: string
            format: date-time
          example: "2024-09-30T23:59:59Z"
        - name: queueId
          in: query
          required: false
          description: Filter to tasks and events associated with a specific queue.
          schema:
            type: string
            format: uuid
        - name: program
          in: query
          required: false
          description: Filter to tasks and events associated with a specific program.
          schema:
            type: string
      responses:
        "200":
          description: A paginated collection of computed metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricList"
        "400":
          $ref: "./components/responses.yaml#/BadRequest"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

  "/workflow/metrics/{metricId}":
    parameters:
      - $ref: "#/components/parameters/MetricIdParam"
    get:
      summary: Get a metric
      description: Retrieve the computed value for a single workflow metric by identifier.
      operationId: getMetric
      tags:
        - Metrics
      parameters:
        - name: groupBy
          in: query
          required: false
          description: >
            Field to group results by. When specified, `value` is null and `breakdown`
            contains a map of group value to computed metric value.
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: Start of time window for filtering events and tasks by timestamp.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: End of time window for filtering events and tasks by timestamp.
          schema:
            type: string
            format: date-time
        - name: queueId
          in: query
          required: false
          description: Filter to tasks and events associated with a specific queue.
          schema:
            type: string
            format: uuid
        - name: program
          in: query
          required: false
          description: Filter to tasks and events associated with a specific program.
          schema:
            type: string
      responses:
        "200":
          description: Metric retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metric"
              examples:
                MetricExample1:
                  $ref: "#/components/examples/MetricExample1"
        "404":
          $ref: "./components/responses.yaml#/NotFound"
        "500":
          $ref: "./components/responses.yaml#/InternalError"

components:
  parameters:
    QueueIdParam:
      name: queueId
      in: path
      required: true
      description: Unique identifier of the queue.
      schema:
        type: string
        format: uuid
      example: c1d2e3f4-a5b6-7890-cdef-1234567890ab

    TaskIdParam:
      name: taskId
      in: path
      required: true
      description: Unique identifier of the task.
      schema:
        type: string
        format: uuid
      example: d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f90

    EventIdParam:
      name: eventId
      in: path
      required: true
      description: Unique identifier of the domain event.
      schema:
        type: string
        format: uuid
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

    MetricIdParam:
      name: metricId
      in: path
      required: true
      description: Unique identifier of the metric (e.g., task_time_to_claim).
      schema:
        type: string
      example: task_time_to_claim

  schemas:
    Queue:
      type: object
      description: A routing queue that organizes tasks by team, program, or skill.
      additionalProperties: false
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the queue.
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Machine-readable name for the queue (e.g., snap-intake).
        description:
          type: string
          maxLength: 2000
          description: Human-readable description of the queue's purpose.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the queue was created.
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the queue was last updated.
          readOnly: true

    QueueCreate:
      allOf:
        - $ref: "#/components/schemas/Queue"
        - type: object
          description: |
            Payload to create a new queue. Name is required.

            Note: id, createdAt, and updatedAt are server-generated (readOnly) and will be returned in the response.
          required:
            - name

    QueueList:
      type: object
      description: Paginated list of queues.
      additionalProperties: false
      required:
        - items
        - total
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Queue"
        total:
          type: integer
          minimum: 0
          description: Total number of queues available.
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Maximum number of queues requested.
        offset:
          type: integer
          minimum: 0
          description: Number of items skipped before the current page.
        hasNext:
          type: boolean
          description: Indicates whether more queues are available beyond the current page.

    QueueUpdate:
      allOf:
        - $ref: "#/components/schemas/Queue"
        - type: object
          description: |
            Payload to update one or more fields of an existing queue. Partial updates are supported.

            Note: id, createdAt, and updatedAt are server-generated (readOnly) and cannot be updated.
          minProperties: 1

    TaskWritable:
      type: object
      description: Client-writable task fields. Base schema for TaskCreate and TaskUpdate.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable label for the task.
        description:
          type: string
          maxLength: 2000
          description: Detailed information about the task.
        status:
          type: string
          x-enum-source: states[].id
          description: Current lifecycle state. Valid values are injected at resolve time from workflow-state-machine.yaml.
        programType:
          $ref: "./components/common.yaml#/Program"
          description: The benefits program this task is associated with.
        isExpedited:
          type: boolean
          description: Whether this task requires expedited processing.
        queueId:
          type: string
          format: uuid
          description: Reference to the Queue this task is routed to.
          x-relationship:
            resource: Queue
        priority:
          type: string
          enum:
            - expedited
            - high
            - normal
            - low
          description: Task processing priority.
        startedAt:
          type: string
          format: date-time
          description: When work began (status transitioned to in_progress).
        completedAt:
          type: string
          format: date-time
          description: When work finished.
        escalatedAt:
          type: string
          format: date-time
          description: When the task was escalated.
        cancelledAt:
          type: string
          format: date-time
          description: When the task was cancelled.
        blockedAt:
          type: string
          format: date-time
          description: When the task entered a waiting state (awaiting_client or awaiting_verification).
        assignedToId:
          type: string
          format: uuid
          description: Reference to the User assigned to this task.
          x-relationship:
            resource: User
        caseId:
          type: string
          format: uuid
          description: Reference to the Case this task belongs to.
          x-relationship:
            resource: Case
        outcome:
          type: string
          description: Completion outcome recorded when the task was completed (e.g., approved, denied).
        completionNotes:
          type: string
          description: Optional notes recorded when the task was completed.

    Task:
      description: A workflow task representing a unit of work in a safety net benefits program.
      unevaluatedProperties: false
      required:
        - id
        - name
        - status
        - createdAt
        - updatedAt
      allOf:
        - $ref: "#/components/schemas/TaskWritable"
        - type: object
          properties:
            id:
              type: string
              format: uuid
              description: Unique identifier for the task.
              readOnly: true
            slaInfo:
              type: array
              description: >
                Engine-managed SLA tracking entries. Populated on create and updated
                on every transition. Read-only — use slaInfo on TaskCreate to specify
                which SLA types to track.
              items:
                $ref: "./components/sla.yaml#/SlaInfo"
              readOnly: true
            createdAt:
              type: string
              format: date-time
              description: Timestamp when the task was created.
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              description: Timestamp when the task was last updated.
              readOnly: true

    DomainEvent:
      $ref: "./components/events.yaml#/DomainEvent"

    DomainEventList:
      description: Paginated list of domain events.
      unevaluatedProperties: false
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/DomainEvent"

    TaskCreate:
      allOf:
        - $ref: "#/components/schemas/TaskWritable"
        - type: object
          description: |
            Payload to create a new task. At minimum, name and status are required.

            Note: id, createdAt, and updatedAt are server-generated and will be returned in the response.
          required:
            - name
            - status
          properties:
            slaInfo:
              type: array
              description: >
                Optional SLA types to track for this task. Client-provided types are
                merged with any types auto-assigned by autoAssignWhen evaluation —
                both apply. Engine populates status, clockStartedAt, and deadline.
              items:
                $ref: "./components/sla.yaml#/SlaInfoCreate"

    TaskList:
      description: Paginated list of tasks.
      unevaluatedProperties: false
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Task"

    TaskUpdate:
      allOf:
        - $ref: "#/components/schemas/TaskWritable"
        - type: object
          description: |
            Payload to update one or more fields of an existing task. Partial updates are supported.

            Note: id, createdAt, and updatedAt are server-generated and cannot be updated.
          minProperties: 1

    Metric:
      type: object
      description: A computed metric value with definition metadata.
      additionalProperties: false
      required:
        - id
        - name
        - aggregate
        - value
        - computedAt
      properties:
        id:
          type: string
          description: Unique metric identifier, from the domain's *-metrics.yaml.
          readOnly: true
        name:
          type: string
          description: Human-readable metric name.
          readOnly: true
        aggregate:
          type: string
          enum:
            - count
            - ratio
            - duration
          description: Aggregation function used to compute the value.
          readOnly: true
        value:
          type: number
          nullable: true
          description: >
            Computed scalar value. count: total matching records. ratio: 0–1.
            duration: median seconds between paired events. null when groupBy is specified.
          readOnly: true
        breakdown:
          type: object
          nullable: true
          description: >
            Map of group value to computed metric value. Present when groupBy is
            specified; null otherwise.
          additionalProperties:
            type: number
          readOnly: true
        targets:
          type: array
          description: Thresholds and goals from the metric definition.
          items:
            $ref: "#/components/schemas/MetricTarget"
          readOnly: true
        computedAt:
          type: string
          format: date-time
          description: Timestamp when the value was computed.
          readOnly: true

    MetricList:
      description: Paginated list of computed metrics.
      unevaluatedProperties: false
      allOf:
        - $ref: "./components/pagination.yaml#/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Metric"

    MetricTarget:
      type: object
      description: A threshold or goal for the metric.
      additionalProperties: false
      properties:
        stat:
          type: string
          description: Statistic type (e.g., p50, ratio, trend).
        operator:
          type: string
          enum:
            - "<"
            - "<="
            - ">"
            - ">="
            - "=="
          description: Comparison operator for evaluating the target.
        amount:
          type: number
          description: Machine-readable threshold value.
        unit:
          type: string
          enum:
            - hours
            - minutes
            - days
            - percent
            - count
          description: Unit for the amount field.
        label:
          type: string
          description: Human-readable target label (e.g., "4h", "10%").
        direction:
          type: string
          enum:
            - up
            - down
          description: Desired trend direction (for trend-type targets).

  examples:
    QueueExample1:
      summary: SNAP intake queue
      value:
        id: c1d2e3f4-a5b6-7890-cdef-1234567890ab
        name: snap-intake
        description: Queue for SNAP program intake tasks.
        createdAt: '2024-08-01T08:00:00Z'
        updatedAt: '2024-08-01T08:00:00Z'

    TaskCreateExample1:
      summary: Create SNAP expedited task with SLA tracking
      value:
        name: Review SNAP application - Rivera household
        description: Review the submitted SNAP application for the Rivera household and verify income documentation.
        status: pending
        programType: snap
        isExpedited: true
        queueId: c1d2e3f4-a5b6-7890-cdef-1234567890ab
        priority: expedited
        caseId: 5f8e3d2c-1a9b-4e6f-8d7c-3a2b1c4d5e6f
        slaInfo:
          - slaTypeCode: snap_expedited

    TaskExample1:
      summary: In-progress SNAP application review task
      value:
        id: d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f90
        name: Review SNAP application - Rivera household
        description: Review the submitted SNAP application for the Rivera household and verify income documentation.
        status: in_progress
        programType: snap
        isExpedited: true
        queueId: c1d2e3f4-a5b6-7890-cdef-1234567890ab
        priority: expedited
        startedAt: '2024-09-02T09:15:00Z'
        assignedToId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        caseId: 5f8e3d2c-1a9b-4e6f-8d7c-3a2b1c4d5e6f
        createdAt: '2024-09-01T14:00:00Z'
        updatedAt: '2024-09-02T09:15:00Z'

    DomainEventExample1:
      summary: Task claimed domain event
      value:
        id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        domain: workflow
        resource: task
        action: claimed
        resourceId: d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f90
        performedById: a1b2c3d4-e5f6-7890-abcd-ef1234567890
