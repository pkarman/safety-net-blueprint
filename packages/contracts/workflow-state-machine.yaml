$schema: ./schemas/state-machine-schema.yaml
version: "1.0"
object: Task
domain: workflow
apiSpec: workflow-openapi.yaml

states:
  pending: {}
  in_progress: {}
  completed: {}

initialState: pending

guards:
  taskIsUnassigned:
    field: assignedToId
    operator: is_null
  callerIsAssignedWorker:
    field: assignedToId
    operator: equals
    value: $caller.id

transitions:
  - trigger: claim
    from: pending
    to: in_progress
    guards:
      - taskIsUnassigned
    effects:
      - type: set
        field: assignedToId
        value: $caller.id
        description: Assign task to the claiming worker
      - type: create
        entity: task-audit-events
        description: Record an "assigned" audit event
        fields:
          taskId: $object.id
          eventType: assigned
          previousValue: $object.status
          newValue: in_progress
          performedById: $caller.id
          occurredAt: $now

  - trigger: complete
    from: in_progress
    to: completed
    guards:
      - callerIsAssignedWorker
    effects:
      - type: create
        entity: task-audit-events
        description: Record a "completed" audit event
        fields:
          taskId: $object.id
          eventType: completed
          previousValue: $object.status
          newValue: completed
          performedById: $caller.id
          occurredAt: $now

  - trigger: release
    from: in_progress
    to: pending
    guards:
      - callerIsAssignedWorker
    effects:
      - type: set
        field: assignedToId
        value: null
        description: Clear assignment so task returns to queue
      - type: create
        entity: task-audit-events
        description: Record a "returned_to_queue" audit event
        fields:
          taskId: $object.id
          eventType: returned_to_queue
          previousValue: $object.status
          newValue: pending
          performedById: $caller.id
          occurredAt: $now

onCreate:
  effects:
    - type: create
      entity: task-audit-events
      description: Record a "created" audit event when a task is first created
      fields:
        taskId: $object.id
        eventType: created
        previousValue: null
        newValue: $object.status
        performedById: $caller.id
        occurredAt: $now

requestBodies:
  claim: {}
  complete:
    type: object
    properties:
      outcome:
        type: string
        description: Completion outcome (e.g., approved, denied)
      notes:
        type: string
        description: Optional notes about the completion
    required:
      - outcome
  release:
    type: object
    properties:
      reason:
        type: string
        description: Why the task is being released
    required:
      - reason
